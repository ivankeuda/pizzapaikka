<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8" />
    <title>Fantasia</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Satisfy&display=swap');
    
        body {
            background-image: url("omapizzabg.jpg");
            background-size: cover;
            background-attachment: fixed;
        }
    
        h1 {
            text-align: center;
            font-family: 'Satisfy', cursive;
        }
    
        h2 {
            text-align: center;
        }
    
        .OmaPizza {
            background-color: rgb(238, 227, 214);
            width: 40%;
            padding: 20px 30px;
            text-align: center;
            margin: 20px auto;
            font-family: 'Lucida Sans', sans-serif;
            border-radius: 10px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.18);
            border-top: 4px solid #b5451b;
        }
    
        .Pohja {
            border: 2px solid black;
            border-radius: 6px;
        }

        .Valmiit {
            border: 2px solid black;
            border-radius: 6px;
        }

    
        #omaPizzaTitle {
            font-size: 80px;
            color: #b5451b;
            text-shadow: 1px 2px 6px rgba(0,0,0,0.13);
        }
    
        #ostoskorinappula {
            text-align: center;
            margin-top: 15px;
        }
    
        #ostoskorinappula2 {
            text-align: center;
            margin-bottom: 15px;
        }
    
        #ostoskorinakyma {
            text-align: center;
            border-radius: 12px;
            border: 1.5px solid #c8a97a;
            background-color: #fdf3e3;
            margin-top: 15px;
            padding: 10px;
        }
    
        #ostoskori-sisalto {
            text-align: left;
            font-family: 'Times New Roman', Times, serif;
        }
    
        #ostok {
            font-style: italic;
            font-weight: bolder;
            color: #b5451b;
        }
    
        #tyhjennin {
            margin: 15px auto;
            display: block;
            padding: 6px 18px;
            border-radius: 6px;
            border: 1.5px solid #b5451b;
            background: white;
            color: #b5451b;
            cursor: pointer;
            font-family: 'Lucida Sans', sans-serif;
            transition: background 0.18s, color 0.18s;
        }
    
        #tyhjennin:hover {
            background: #b5451b;
            color: white;
        }
    
        #valmiitvalikko {
            text-align: center;
            border-radius: 12px;
            border: 1.5px solid #c8a97a;
            background-color: #fdf3e3;
            margin-top: 15px;
            padding: 10px;
        }
    
        #VALMIITP {
            margin-bottom: 15px;
        }
    
        #tilaanappula {
            text-align: center;
            border-radius: 10px;
            border: 1.5px solid #b5451b;
            background-color: #b5451b;
            color: white;
            margin: 15px auto;
            padding: 8px 22px;
            display: inline-block;
            cursor: pointer;
            font-family: 'Lucida Sans', sans-serif;
            font-weight: 600;
            letter-spacing: 0.04em;
            transition: background 0.18s;
        }
    
        #tilaanappula:hover {
            background-color: #8f3415;
            border-color: #8f3415;
        }

        #takaisinnappula {
            display: inline-block;
            margin-top: 10px;
            margin-bottom: 4px;
            padding: 6px 18px;
            border-radius: 6px;
            border: 1.5px solid #b5451b;
            background: white;
            color: #b5451b;
            cursor: pointer;
            font-family: 'Lucida Sans', sans-serif;
            text-decoration: none;
            font-size: 0.9rem;
            transition: background 0.18s, color 0.18s;
        }

        #takaisinnappula:hover {
            background: #b5451b;
            color: white;
        }

        #aika {
            margin: 15px auto;
            display: block;
            padding: 6px 18px;
            border-radius: 6px;
            border: 1.5px solid #b5451b;
            background: white;
            color: #b5451b;
            cursor: pointer;
            font-family: 'Lucida Sans', sans-serif;
            transition: background 0.18s, color 0.18s;
        }

        #aika:hover {
            background: #b5451b;
            color: white;
        }

        .topnav {
            background-color: #333;
            overflow: hidden;
            height: 48px;
            display: flex;
            align-items: center;
        }
        .topnav a {
            color: #f2f2f2;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 17px;
            background-color: #333;
            border: none;
            cursor: pointer;
        }
        .topnav a:hover,
        #kirjauduulos_btn:hover {
            background-color: #ddd;
            color: black;
            transition: 0.2s;
        }
        .topnav a.active {
            background-color: #b8741b;
            color: white;
        }
        .right {
            margin-left: auto;
            display: flex;
            align-items: center;
        }
        #kirjauduulos_btn,
        #userName {
            float: right;
            color: #f2f2f2;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 17px;
            background-color: #333;
            border: none;
        }

        #valmistuotteet {
            text-align: center;
            border-radius: 12px;
            border: 1.5px solid #c8a97a;
            background-color: #fdf3e3;
            margin-top: 15px;
            padding: 10px;
        }

        #lisävalikko {
            margin: 15px;
        }

    </style>
</head>
<body>
    <div class="topnav">
        <a class="active" href="index.html">Etusivu</a>
        <a href="index.html #meistä">Meistä</a>
        <a href="omapizza.html">Tilaa nyt!</a>
        <a href="palaute.html">Arvostele meidät</a>
        <a href="menu.html">Menu</a>
    </div>  
    <div class="OmaPizza">
        <header>
            <h1 id="omaPizzaTitle">Fantasia Pizza</h1>
            <p id="omaPizzaKuvaus">Kokeile, miksaa, hulluttele ja löydä pizzan maistuvin makumaailma juuri sinulle!</p>
        </header>
        <section>
            <h3>KOKO</h3>
            <input type="radio" id="medium" name="KOKO" value="medium">
            <label for="medium">Normaali</label> 
            <input type="radio" id="large" name="KOKO" value="large" checked>
            <label for="large">Iso</label>
        </section>
        <section>   
            <h3>POHJA</h3>
            <select class="Pohja" id="POHJA">
                <option>normaali pizzapohja</option>
                <option>gluteeniton pizzapohja +2€</option>
            </select>
            <select class="Pohja" id="KASTIKE">
                <option>tomaattikastike</option>
                <option>Chilimajoneesi</option>
                <option>TUFF kastike</option>
                <option>Secret valkoinen kastike</option>
                <option>Cheesekastike</option>
                <option>BBQ kastike</option>
                <option>Ei pohjakastiketta</option>
            </select>
            
            <h2>Lisää täytteitä</h2>
            <div id="LISUKKEET">
                <input type="checkbox" id="kinkku" name="Lisukkeet" value="kinkku">
                <label for="kinkku">kinkku</label>
                <input type="checkbox" id="pepperoni" name="Lisukkeet" value="pepperonimakkara">
                <label for="pepperoni">pepperonimakkara</label>
                <input type="checkbox" id="cheese" name="Lisukkeet" value="cheesy cheese">
                <label for="cheese">cheesy cheese</label>
                <input type="checkbox" id="kalanpyrstöt" name="Lisukkeet" value="kalanpyrstöt">
                <label for="kalanpyrstöt">kalanpyrstöt</label>
            </div>

            <section>
                <input type="button" id="ostoskorinappula" name="Lisää ostoskoriin" value="Lisää ostoskoriin" onclick="ostoskori()">
            </section>

            <section id="valmiitvalikko">
                <h2>Valmiit pizzat</h2>
                <div id="VALMIITP">
                    <select class="Valmiit" id="valmiitpizzat">
                        <option id="pepperonipizza">Pepperoni pizza</option>
                        <option id="kebabpizza">Kebab pizza</option>
                        <option id="Mozzarellapizza">Mozzarella pizza</option>
                        <option id="Kanapizza">Kana pizza</option>
                        <option id="Jauhelihapizza">Jauheliha pizza</option>
                        <option id="Tuffpizza">Tuff pizza</option>
                    </select>
                    <input type="checkbox" id="glutpohja" name="POHJA" value="gluteeniton">
                    <label for="glutpohja">gluteeniton pohja +2€</label>
                    <h3>KOKO</h3>
                    <input type="radio" id="medium2" name="KOKO" value="medium">
                    <label for="medium">Normaali</label> 
                    <input type="radio" id="large2" name="KOKO" value="large" checked>
                    <label for="large">Iso</label>

                </div>
                <section>
                    <input type="button" id="ostoskorinappula2" name="Lisää ostoskoriin" value="Lisää ostoskoriin" onclick="valmiskori()">
                </section>
            </section>

            <section id="valmistuotteet">
                <h2>Lisä tuotteet</h2>
                <div id="lisävalikko">
                    <select class="lisätuote" id="lisätuotteet">
                        <option value="Vesi">Vesi - 1.50€</option>
                        <option value="Pepsi Max">Pepsi Max - 2.50€</option>
                        <option value="Coca-cola">Coca-cola - 2.50€</option>
                    </select>
                </div>
                <section>
                    <input type="button" id="ostoskorinappula3" name="Lisää ostoskoriin" value="Lisää ostoskoriin" onclick="lisakori()">
                </section>
            </section>

        </section>
        <section id="ostoskorinakyma">
            <h1 id="ostok">🛒 Ostoskori 🛒</h1>
            <div id="ostoskori-sisalto"></div>
                <div><a id="tilaanappula" href="tilaus.html">Tilaa heti!</a></div>
            <input type="button" id="tyhjennin" name="tyhjenna ostoskori" value="Paina tyhjentääksesi ostoskori" onclick="tyhjenna()">
            <input type="button" id="aika" value="Arvioi valmistusaika" onclick="toimitusaika()">
        </section>
        <section>
            <a href="index.html" id="takaisinnappula">← Takaisin</a>
        </section>
    </div>
    <script type="text/javascript" src="main.js"></script>
</body>
</html>
