<body>  
    <header>

        <nav>
            <ul id="bar">
                <li><a href='index.html'>Etusivu</a></li>
                <li><a href='menu.html'>Menu</a></li>
                <li><a href="omapizza.html">Luo oma pizza</a></li>
            </ul>
        </nav>
    </header>

    <div class="OmaPizza">
          
        <h1 id="omaPizzaTitle" style="color: #1a6e2a;">Fantasia Pizza</h1>
        <p id="omaPizzaKuvaus">Kokeile, miksaa, hulluttele ja löydä pizzan maistuvin makumaailma juuri sinulle!</p>
        
        <section>
            <h3>KOKO</h3>
            <input type="radio" id="medium" name="KOKO" value="medium">
            <label for="medium">Medium</label> 
            <input type="radio" id="large" name="KOKO" value="large">
            <label for="large">Large</label>
        </section>
        <section>   
            <h3>POHJA</h3>
            <select class="Pohja">
                <option>normaali pizzapohja</option>
                <option>gluteeniton pizzapohja +2€</option>
            </select>
            <select class="Pohja">
                <option>tomaattikastikke</option>
                <option>Chilimajoneesi</option>
                <option>TUFF kastikke</option>
                <option>Secret valkoinen kastikke</option>
                <option>Cheesekastikke</option>
                <option>BBQ kastikke</option>
                <option>Ei pohjakastiketta</option>
            </select>

            
            <h2>Lisää täytteitä</h2>
            <input type="checkbox" id="kinkku" name="Lisukset" value="kinkku">
            <label for="kinkku">kinkku</label>
            <input type="checkbox" id="pepperonimakkara" name="Lisukset" value="pepperonimakkara">
            <label for="pepperonimakkara">pepperonimakkara</label>
            <input type="checkbox" id="cheesy cheese" name="Lisukset" value="cheesy cheese">
            <label for="cheesy cheese">cheesy cheese</label>

        
        </section>
    </div>
